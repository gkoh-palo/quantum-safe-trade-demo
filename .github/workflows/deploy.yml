name: Deploy

# Single environment, deployed straight from main.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  migrate:
    name: DB migrations
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect db package
        id: detect
        run: |
          if [ -d packages/db ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.present == 'true'
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        if: steps.detect.outputs.present == 'true'
        run: pnpm install --frozen-lockfile
      - name: Run migrations
        if: steps.detect.outputs.present == 'true'
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: pnpm --filter @qstd/db migrate

  discover:
    name: Discover workers
    needs: migrate
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.find.outputs.dirs }}
      has: ${{ steps.find.outputs.has }}
    steps:
      - uses: actions/checkout@v4
      - name: Find deployable workers
        id: find
        run: |
          dirs=$(find workers -mindepth 2 -maxdepth 2 \( -name 'wrangler.toml' -o -name 'wrangler.jsonc' \) 2>/dev/null \
            | xargs -r -n1 dirname | sort -u | jq -R . | jq -s -c .)
          dirs=${dirs:-[]}
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"
          if [ "$dirs" = "[]" ]; then echo "has=false" >> "$GITHUB_OUTPUT"; else echo "has=true" >> "$GITHUB_OUTPUT"; fi
          echo "Deployable workers: $dirs"

  deploy:
    name: Deploy ${{ matrix.dir }}
    needs: discover
    if: needs.discover.outputs.has == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJSON(needs.discover.outputs.dirs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.dir }}
          # Pin to v4: the action otherwise falls back to wrangler 3.90.0, which
          # predates wrangler.jsonc support (added in 3.91.0) and so fails to read
          # `main` from our JSONC configs → "Missing entry-point".
          wranglerVersion: "4"
          command: deploy
